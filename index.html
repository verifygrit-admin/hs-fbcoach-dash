<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrittyOS — Coach Dashboard</title>
<style>
:root {
  --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
  --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --faint: #94a3b8;
  --accent: #16a34a; --accent-l: #f0fdf4; --accent-t: #15803d;
  --gold: #d97706; --gold-l: #fffbeb;
  --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --offer: #7c3aed; --offer-l: #f5f3ff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

/* ── Gate ── */
#gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
.gate-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 32px; width: min(360px, 90vw); text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
.gate-logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; margin-bottom: 4px; }
.gate-sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 28px; }
.gate-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none; text-align: center; letter-spacing: 2px; transition: border-color .15s; }
.gate-input:focus { border-color: var(--accent); }
.gate-btn { margin-top: 12px; width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background .15s; }
.gate-btn:hover { background: var(--accent-t); }
.gate-err { margin-top: 10px; color: #dc2626; font-size: 0.8rem; min-height: 18px; }

/* ── App shell ── */
#app { display: none; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
.topbar-logo { font-size: 1.1rem; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }
.topbar-title { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
.topbar-school { margin-left: auto; font-size: 0.72rem; color: var(--faint); font-weight: 600; letter-spacing: 0.3px; }

/* ── Landing ── */
#landing { padding: 16px; }
.landing-heading { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.landing-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; }
.roster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }

/* ── Player card (landing) ── */
.player-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: box-shadow .15s, border-color .15s; position: relative; overflow: hidden; }
.player-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); border-color: var(--accent); }
.player-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
.pc-offer::before { background: var(--offer); }
.pc-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.pc-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; color: var(--muted); flex-shrink: 0; overflow: hidden; }
.pc-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.pc-name { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.pc-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.pc-said { font-size: 0.65rem; color: var(--faint); margin-top: 1px; letter-spacing: 0.3px; }
.pc-offer-banner { background: var(--offer-l); border: 1px solid #c4b5fd; border-radius: 7px; padding: 8px 10px; margin-bottom: 10px; }
.pc-offer-label { font-size: 0.65rem; font-weight: 700; color: var(--offer); letter-spacing: 0.5px; text-transform: uppercase; }
.pc-offer-school { font-size: 0.85rem; font-weight: 700; color: var(--offer); margin-top: 1px; }
.pc-offer-detail { font-size: 0.7rem; color: #7c3aed99; margin-top: 1px; }
.pc-stats { display: flex; gap: 12px; margin-bottom: 10px; }
.pc-stat { flex: 1; }
.pc-stat-val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
.pc-offer-count .pc-stat-val { color: var(--offer); }
.pc-stat-lbl { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.2px; }
.progress-wrap { margin-bottom: 10px; }
.progress-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.progress-label span { font-size: 0.7rem; color: var(--muted); }
.progress-label strong { font-size: 0.7rem; color: var(--accent-t); }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s ease; }
.pc-events { }
.pc-events-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.pc-event-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.pc-event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-critical { background: #dc2626; }
.dot-registered { background: var(--accent); }
.dot-upcoming { background: var(--faint); }
.pc-event-name { font-size: 0.72rem; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-event-date { font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }
.pc-cta { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; padding: 8px; background: var(--accent-l); border-radius: 7px; font-size: 0.75rem; font-weight: 600; color: var(--accent-t); }

/* ── Detail view ── */
#detail { display: none; padding-bottom: 24px; }
.detail-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
.back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--text); }
.detail-name { font-size: 1rem; font-weight: 800; }
.detail-pos { font-size: 0.75rem; color: var(--muted); }
.detail-offer-pill { margin-left: auto; background: var(--offer-l); border: 1px solid #c4b5fd; border-radius: 20px; padding: 4px 10px; font-size: 0.7rem; font-weight: 700; color: var(--offer); }

/* Offer highlight bar */
.offer-bar { margin: 12px 16px 0; background: var(--offer-l); border: 1.5px solid #c4b5fd; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.offer-bar-icon { font-size: 1.4rem; }
.offer-bar-label { font-size: 0.65rem; font-weight: 700; color: var(--offer); letter-spacing: 0.5px; text-transform: uppercase; }
.offer-bar-school { font-size: 1rem; font-weight: 800; color: var(--offer); }
.offer-bar-detail { font-size: 0.72rem; color: #7c3aedaa; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); margin-top: 12px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 10px 14px; font-size: 0.75rem; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
.tab.active { color: var(--accent-t); border-bottom-color: var(--accent); }

.tab-panel { display: none; padding: 14px 16px; }
.tab-panel.active { display: block; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
.data-table th { background: var(--surface2); color: var(--muted); font-weight: 700; text-align: left; padding: 7px 8px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
.data-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
.data-table tr:hover td { background: var(--surface2); }
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }

/* Score bar */
.score-cell { display: flex; align-items: center; gap: 6px; }
.score-bar-bg { flex: 1; max-width: 60px; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; }
.score-val { font-weight: 700; font-size: 0.72rem; }

/* Dot indicators */
.dot-yn { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.dot-yes { background: var(--accent); }
.dot-no { background: var(--border); }

/* Events list */
.event-list { display: flex; flex-direction: column; gap: 8px; }
.event-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; }
.event-item.critical { border-color: #fca5a5; background: #fff5f5; }
.event-item.registered { border-color: #86efac; background: var(--accent-l); }
.event-item.today { border-color: var(--gold); background: var(--gold-l); }
.event-badge { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; border-radius: 4px; padding: 2px 6px; flex-shrink: 0; margin-top: 2px; }
.badge-critical { background: #fee2e2; color: #dc2626; }
.badge-registered { background: #dcfce7; color: #16a34a; }
.badge-today { background: #fef3c7; color: #d97706; }
.badge-upcoming { background: var(--surface2); color: var(--muted); }
.event-info { flex: 1; min-width: 0; }
.event-school { font-size: 0.8rem; font-weight: 700; color: var(--text); }
.event-type { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
.event-when { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.event-note { font-size: 0.65rem; color: var(--offer); font-style: italic; margin-top: 2px; }
.event-div { font-size: 0.65rem; background: var(--surface2); border-radius: 4px; padding: 1px 5px; color: var(--faint); display: inline-block; margin-top: 2px; }

/* Division badge */
.div-badge { font-size: 0.62rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; display: inline-block; }
.div-fcs { background: #dcfce7; color: #166534; }
.div-d3 { background: #dbeafe; color: #1e40af; }
.div-d2 { background: #fce7f3; color: #9d174d; }
.div-fbs { background: #fef3c7; color: #92400e; }

/* Tracking columns — show checkmarks */
.chk { text-align: center; }
.chk-y { color: var(--accent); font-size: 0.9rem; }
.chk-n { color: var(--border); font-size: 0.9rem; }

/* Section header */
.section-head { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 10px 0 6px; }

/* Rank badge */
.rank-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); font-size: 0.7rem; font-weight: 700; color: var(--muted); }
.rank-num.top { background: var(--gold-l); color: var(--gold); border: 1px solid #fcd34d; }

@media (max-width: 600px) {
  .roster-grid { grid-template-columns: 1fr; }
  .data-table { font-size: 0.68rem; }
  .data-table th, .data-table td { padding: 6px 6px; }
}
</style>

// ── Film Views (localStorage overrides) ──
function filmViewsKey(id) { return `gritos_filmviews_${id}`; }
function getFilmViews(p) {
  const stored = localStorage.getItem(filmViewsKey(p.id));
  return stored !== null ? parseInt(stored) : p.filmViews;
}
function editFilmViews(id, statEl) {
  const player = PLAYERS.find(p => p.id === id);
  const current = getFilmViews(player);
  const input = prompt(`Update Hudl film views for ${player.name}:`, current);
  if (input === null) return;
  const val = parseInt(input);
  if (isNaN(val) || val < 0) return;
  localStorage.setItem(filmViewsKey(id), val);
  statEl.querySelector('.film-views-val').textContent = val;
}

// ── Auth ──
const ACCESS = btoa("BCHS2027"); // password: BCHS2027
function checkGate() {
  const v = document.getElementById('gateInput').value.trim();
  if (btoa(v) === ACCESS || sessionStorage.getItem('gritos_auth') === ACCESS) {
    sessionStorage.setItem('gritos_auth', ACCESS);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderLanding();
  } else {
    document.getElementById('gateErr').textContent = 'Incorrect access code.';
    document.getElementById('gateInput').value = '';
  }
}
document.getElementById('gateInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate(); });
if (sessionStorage.getItem('gritos_auth') === ACCESS) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── Helpers ──
function divBadge(div) {
  const cls = div.includes('FCS')||div.includes('1-') ? 'div-fcs' : div.includes('D3')||div.includes('3-') ? 'div-d3' : div.includes('D2')||div.includes('2-') ? 'div-d2' : 'div-fbs';
  const label = div.includes('FCS')||div.includes('1-FCS') ? 'FCS' : div.includes('FBS')||div.includes('1-FBS') ? 'FBS' : div.includes('2-') ? 'D2' : 'D3';
  return `<span class="div-badge ${cls}">${label}</span>`;
}
function yn(v) { return v ? '<span class="chk-y">✓</span>' : '<span class="chk-n">·</span>'; }
function scoreColor(s) { return s >= 62.5 ? '#7c3aed' : s >= 50 ? '#d97706' : s >= 37.5 ? '#2563eb' : '#64748b'; }

// ── Landing ──
function nextEvents(player, n) {
  return player.events.filter(e => !e.past).slice(0, n);
}

function renderLanding() {
  const grid = document.getElementById('rosterGrid');
  grid.innerHTML = PLAYERS.map((p, i) => {
    const topEvents = nextEvents(p, 3);
    const offerClass = p.offerHighlight ? 'pc-offer' : '';
    return `<div class="player-card ${offerClass}" onclick="showDetail(${i})">
      <div class="pc-top">
        <div class="pc-avatar">${p.headshot ? `<img src="${p.headshot}" alt="${p.name}" onerror="this.parentElement.textContent='${p.initials}'">` : p.initials}</div>
        <div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-meta">${p.position} · Class of ${p.classYear}</div>
          <div class="pc-said">${p.id}</div>

      </div>
      ${p.offerHighlight ? `

        </div>

// ── Detail ──
let currentPlayer = null;
function showDetail(idx) {
  currentPlayer = PLAYERS[idx];
  const p = currentPlayer;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('detailName').textContent = p.name;
  document.getElementById('detailPos').textContent = `${p.position} · ${p.id} · Class ${p.classYear}`;

  const pill = document.getElementById('detailOfferPill');
  let pillHtml = '';
  if (p.offerHighlight) pillHtml += `<span class="detail-offer-pill">🎉 Verbal Offer — ${p.offerHighlight.school}</span> `;
  else if (p.onCampusOffers > 0) pillHtml += `<span class="detail-offer-pill" style="background:#f0fdf4;border-color:#86efac;color:#16a34a">${p.onCampusOffers} On-Campus Offer${p.onCampusOffers>1?'s':''}</span> `;
  pillHtml += `<a href="${p.hudlUrl}" target="_blank" rel="noopener" class="detail-offer-pill" style="background:#fff7ed;border-color:#fed7aa;color:#c2410c;text-decoration:none">🎬 Film ↗</a>`;
  pill.innerHTML = pillHtml;

  const offerBar = document.getElementById('detailOfferBar');
  if (p.offerHighlight) {
    offerBar.innerHTML = `<div class="offer-bar">
      <div class="offer-bar-icon">🏈</div>
      <div>
        <div class="offer-bar-label">Verbal Offer — ${p.offerHighlight.date}</div>
        <div class="offer-bar-school">${p.offerHighlight.school}</div>
        <div class="offer-bar-detail">${p.offerHighlight.coach} · ${p.offerHighlight.conference}</div>
        ${p.offerHighlight.note ? `<div class="offer-bar-detail" style="margin-top:2px;font-style:italic">${p.offerHighlight.note}</div>` : ''}
      </div>
    </div>`;
  } else { offerBar.innerHTML = ''; }

  const tabs = ['Scoreboard','Short List','Tracking','Events'];
  document.getElementById('detailTabs').innerHTML = tabs.map((t,i) =>
    `<div class="tab ${i===0?'active':''}" onclick="switchTab(${i})">${t}</div>`
  ).join('');

  document.getElementById('detailPanels').innerHTML = `
    <div class="tab-panel active" id="panel0">${renderScoreboard(p)}</div>
    <div class="tab-panel" id="panel1">${renderShortList(p)}</div>
    <div class="tab-panel" id="panel2">${renderTracking(p)}</div>
    <div class="tab-panel" id="panel3">${renderEvents(p)}</div>
  `;
}

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.tab-panel').forEach((p,j) => p.classList.toggle('active', i===j));
}

function showLanding() {
  document.getElementById('detail').style.display = 'none';
  document.getElementById('landing').style.display = 'block';
}

function renderScoreboard(p) {
  const rows = p.scoreboard.map(s => {
    const c = scoreColor(s.score);
    const pct = (s.score / 100) * 100;
    const isOffer = p.offerHighlight && p.offerHighlight.school.toLowerCase().includes(s.school.toLowerCase().split(' ')[0]);
    return `<tr${isOffer ? ' style="background:#f5f3ff"' : ''}>
      <td><span class="rank-num ${s.rank <= 3 ? 'top' : ''}">${s.rank}</span></td>
      <td style="font-weight:${isOffer?700:500}">${s.school}${isOffer?' 🎉':''}</td>
      <td>${divBadge(s.div)}</td>
      <td><div class="score-cell"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${c}"></div></div><span class="score-val" style="color:${c}">${s.score}%</span></div></td>
      <td class="chk">${yn(s.hcContact)}</td>
      <td class="chk">${yn(s.acContact)}</td>
      <td class="chk">${yn(s.jrDay)}</td>
      <td class="chk">${yn(s.camp)}</td>
      <td class="chk">${yn(s.visit)}</td>
      <td class="chk">${yn(s.admRead)}</td>
    </tr>`;
  }).join('');
  return `<div class="table-wrap"><table class="data-table">
    <thead><tr>
      <th>#</th><th>School</th><th>Div</th><th>Score</th>
      <th>HC</th><th>AC</th><th>Jr Day</th><th>Camp</th><th>Visit</th><th>Adm</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderShortList(p) {
  const preOffer = p.shortList.filter(s => s.preOffer);
  const rest = p.shortList.filter(s => !s.preOffer);
  function rows(arr) {
    return arr.map(s => `<tr>
      <td style="font-weight:500">${s.school}</td>
      <td>${s.conf}</td>
      <td>${divBadge(s.div)}</td>
      <td style="text-align:right">${s.coa}</td>
      <td style="text-align:right">${s.ltdv}</td>
      <td style="text-align:right;font-weight:600;color:var(--accent-t)">${s.roi}x</td>
    </tr>`).join('');
  }
  return `<div class="table-wrap"><table class="data-table">
    <thead><tr><th>School</th><th>Conf</th><th>Div</th><th style="text-align:right">Ann. COA</th><th style="text-align:right">LTDV</th><th style="text-align:right">ROI</th></tr></thead>
    <tbody>
      <tr><td colspan="6" style="background:var(--accent-l);font-size:0.65rem;font-weight:700;color:var(--accent-t);text-transform:uppercase;letter-spacing:0.4px;padding:6px 8px">Pre-Offer Phase (${preOffer.length})</td></tr>
      ${rows(preOffer)}
      <tr><td colspan="6" style="background:var(--surface2);font-size:0.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;padding:6px 8px">Remaining Short List (${rest.length})</td></tr>
      ${rows(rest)}
    </tbody>
  </table></div>`;
}

function renderTracking(p) {
  const rows = p.tracking.map(t => `<tr>
    <td style="font-weight:500;white-space:nowrap">${t.school}</td>
    <td style="color:var(--muted)">${t.coach}</td>
    <td style="color:var(--faint);font-size:0.65rem">${t.role}</td>
    <td class="chk">${yn(t.followedOnX)}</td>
    <td class="chk">${yn(t.followsYou)}</td>
    <td class="chk">${yn(t.dmSent)}</td>
    <td class="chk">${yn(t.replied||t.handoff)}</td>
    <td class="chk">${yn(t.jrDay||t.visit)}</td>
    <td class="chk">${yn(t.camp)}</td>
    <td class="chk">${yn(t.hcContact)}</td>
    <td class="chk">${yn(t.offer)}</td>
  </tr>`).join('');
  return `<div class="table-wrap"><table class="data-table">
    <thead><tr>
      <th>School</th><th>Coach</th><th>Role</th>
      <th>Fol'd X</th><th>Fols You</th><th>DM</th><th>Reply</th>
      <th>Jr Day</th><th>Camp</th><th>HC</th><th>Offer</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderEvents(p) {
  const months = [...new Set(p.events.map(e => e.month))];
  return months.map(month => {
    const evs = p.events.filter(e => e.month === month);
    return `<div class="section-head">${month}</div>
    <div class="event-list">
    ${evs.map(e => {
      const cls = e.today ? 'today' : e.critical ? 'critical' : e.registered ? 'registered' : '';
      const badgeCls = e.today ? 'badge-today' : e.critical ? 'badge-critical' : e.registered ? 'badge-registered' : 'badge-upcoming';
      const badgeTxt = e.today ? 'TODAY' : e.critical ? 'CRITICAL' : e.registered ? 'REGISTERED' : 'UPCOMING';
      return `<div class="event-item ${cls}">
        <span class="event-badge ${badgeCls}">${badgeTxt}</span>
        <div class="event-info">
          <div class="event-school">${e.school}</div>
          <div class="event-type">${e.type} ${divBadge(e.div)}</div>
          <div class="event-when">${e.day}, ${e.date} · ${e.time} · ${e.location}</div>
          ${e.note ? `<div class="event-note">${e.note}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
    </div>`;
  }).join('');
}

// ── Init ──
if (sessionStorage.getItem('gritos_auth') === ACCESS) {
  renderLanding();
}
</script>
</body>
</html>
